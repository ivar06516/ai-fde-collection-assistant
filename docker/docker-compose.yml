version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: ../.env
    volumes:
      - ../data:/app/data        # persist SQLite DB across restarts
      - ../src:/app/src          # hot-reload on code changes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_API_URL=http://api:8000
    env_file: ../.env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../ui:/app/ui            # hot-reload UI changes

volumes: {}
