name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/collection-api
  UI_IMAGE:  ghcr.io/${{ github.repository }}/collection-ui
  PYTHON_VERSION: "3.11"

jobs:

  # ── Job 1: Lint + Type-check ──────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy type-check
        run: mypy src/ --ignore-missing-imports

  # ── Job 2: Tests + Coverage ───────────────────────────────────────────────
  test:
    name: Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LLM_PROVIDER: free_cloud
      DATABASE_URL: sqlite:///data/test.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Seed test database
        run: python scripts/seed_db.py --scenarios-only

      - name: Run tests
        run: pytest tests/ --cov=src --cov-report=xml --cov-report=html -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # ── Job 3: Docker Build + Push ────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Build & push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.UI_IMAGE }}:${{ github.sha }}
            ${{ env.UI_IMAGE }}:latest

  # ── Job 4: Deploy to Staging (develop branch) ─────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Trigger Render staging deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_STAGING_DEPLOY_HOOK not configured — skipping (add secret in GitHub Settings > Secrets)"
          else
            curl --fail -X POST "$DEPLOY_HOOK"
            echo "Staging deploy triggered"
          fi

  # ── Job 5: Deploy to Production (main branch) ─────────────────────────────
  deploy-prod:
    name: Deploy → Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Render prod deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_PROD_DEPLOY_HOOK not configured — skipping (add secret in GitHub Settings > Secrets)"
          else
            curl --fail -X POST "$DEPLOY_HOOK"
            echo "Production deploy triggered"
          fi

      - name: Notify deploy complete
        run: |
          echo "Deployed commit ${{ github.sha }} to production"
          echo "API: https://fde-collection-api.onrender.com/health"
          echo "UI:  https://fde-collection-assistant.streamlit.app"
