services:
  - type: web
    name: fde-collection-api
    runtime: docker
    dockerfilePath: docker/Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false               # set manually in Render dashboard
      - key: LLM_PROVIDER
        value: free_cloud
      - key: DATABASE_URL
        value: sqlite:///data/collection_assistant.db
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
