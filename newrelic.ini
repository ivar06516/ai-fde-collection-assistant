# =============================================================================
# New Relic Configuration — OTLP Mode
# =============================================================================
# This project uses OpenTelemetry (OTLP HTTP) to send data to New Relic.
# The native New Relic Python agent (pip install newrelic) is NOT used here.
# All configuration is driven by environment variables (see below).
#
# Required environment variables (set in Render / GitHub Secrets):
#   OTLP_ENDPOINT   = https://otlp.nr-data.net
#   OTLP_TOKEN      = <New Relic Ingest - License key>
#   OTLP_PROVIDER   = newrelic
#   SERVICE_NAME    = collection-assistant         (optional, default shown)
#   ENVIRONMENT     = production                   (optional, default shown)
#
# NEVER hardcode license keys. Always use environment variables.
# =============================================================================

[newrelic]

# --- Identity ---
app_name = %(NEW_RELIC_APP_NAME)s
license_key = %(NEW_RELIC_LICENSE_KEY)s          # Not used — set OTLP_TOKEN instead
environment = %(ENVIRONMENT)s

# --- Distributed Tracing (W3C Trace Context) ---
distributed_tracing.enabled = true
distributed_tracing.w3c_trace_context = true

# --- Transaction Tracing ---
transaction_tracer.enabled = true
transaction_tracer.transaction_threshold = 500   # ms — trace anything > 500ms
transaction_tracer.stack_trace_threshold = 500
transaction_tracer.explain_enabled = true
transaction_tracer.explain_threshold = 200       # ms — explain slow SQL

# --- Error Collection ---
error_collector.enabled = true
error_collector.ignore_status_codes = 404, 405  # Don't alert on expected 404s

# --- Logging ---
log_level = info                                 # Use 'debug' only in DEV

# --- Browser Monitoring ---
browser_monitoring.auto_instrument = true

# --- Application Logging (Logs in Context) ---
application_logging.enabled = true
application_logging.forwarding.enabled = true
application_logging.forwarding.max_samples_stored = 10000
application_logging.local_decorating.enabled = true

# --- Custom Events ---
custom_insights_events.enabled = true
custom_insights_events.max_samples_stored = 30000

# =============================================================================
# Environment-specific overrides
# =============================================================================

[newrelic:development]
log_level = debug
transaction_tracer.transaction_threshold = 0    # Trace everything in dev
error_collector.ignore_status_codes = 404

[newrelic:staging]
log_level = info
transaction_tracer.transaction_threshold = 500
error_collector.ignore_status_codes = 404, 405

[newrelic:production]
log_level = info
transaction_tracer.transaction_threshold = 500
error_collector.ignore_status_codes = 404, 405

# =============================================================================
# OTLP Endpoint Reference (for documentation)
# =============================================================================
# US:  https://otlp.nr-data.net
# EU:  https://otlp.eu01.nr-data.net
#
# Auth header: api-key: <INGEST-LICENSE key>
# Traces:  POST <endpoint>/v1/traces
# Metrics: POST <endpoint>/v1/metrics
# Logs:    POST <endpoint>/v1/logs
